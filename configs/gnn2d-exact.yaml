# Mesh-agnostic P1 GNN trained on exact line/circle cuts of smooth surfaces.
seed: 0
data:
  mode: exact2d
  n_samples: 2000
  val_fraction: 0.2
  mesh_type: delaunay
  n_interior_range: [50, 150]
  boundary_divisions: [8, 8]
  xlim: [0.0, 1.0]
  ylim: [0.0, 1.0]
  curves: [line, circle]
  coefficient_sigma: 1.0
model:
  type: gnn
  conv: gat
  hidden: 32
  heads: 8
  dropout: 0.2
  layers: 2
train:
  epochs: 60
  lr: 0.001
  batch_size: 32
  threshold: 0.1

# GAT trained on static exact cuts and evolved oscillatory P1 states.
seed: 0
data:
  mode: mixed2d
  n_samples: 1000
  val_fraction: 0.2
  exact_fraction: 0.25
  mesh_range: [8, 12]
  curves: [line, circle]
  time_range: [0.02, 0.20]
  limited_fraction: 0.05
  cfl: 0.15
  max_steps: 1500
  max_seconds_per_sample: 5.0
  max_generation_seconds: 600.0
model:
  type: gnn
  conv: gat
  hidden: 32
  heads: 8
  dropout: 0.2
  layers: 2
train:
  epochs: 60
  lr: 0.001
  batch_size: 32
  threshold: 0.1

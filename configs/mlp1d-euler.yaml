# Fixed-stencil MLP trained on random Euler Riemann density fields.
seed: 0
data:
  mode: euler_riemann
  n_samples: 2000
  N: 1
  k_range: [50, 150]
  crop: false
  val_fraction: 0.2
  domain: [0.0, 1.0]
  rho_range: [0.2, 2.0]
  velocity_range: [-0.5, 0.5]
  pressure_range: [0.1, 2.0]
  diaphragm_range: [0.35, 0.65]
  t_range: [0.03, 0.1]
  cfl: 0.2
model:
  type: mlp
  hidden: [32, 32, 32]
  dropout: 0.0
train:
  epochs: 60
  lr: 0.001
  batch_size: 32
  threshold: 0.5

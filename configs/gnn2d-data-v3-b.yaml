# Phase 6 ladder step v3-B: v3-A plus generator components 1-3 -- the expanded
# signed-distance curve family (corners, endpoints, ellipses, thin strips, and
# several interacting fronts), the log-uniform amplitude continuum, the steep-
# layer continuum, smooth-extremum negatives, and the widened mesh diversity.
# Evolved solver states are still absent; they are the single v3-C factor.
seed: 0
data:
  seed: 0
  split_seed: 0
  mode: data-v3
  n_samples: 2000
  val_fraction: 0.2
  data_v3:
    ladder: v3-b
    label: {alpha: 0.15, gamma: 2.0, quadrature_order: 8}
    cache_dir: runs/data-v3
model:
  type: gnn
  feature_schema: invariant-node-v2
  edge_dim: null
  conv: gat
  hidden: 32
  heads: 8
  dropout: 0.2
  layers: 2
train:
  seed: 0
  device: auto
  epochs: 60
  lr: 0.001
  batch_size: 64
  threshold: 0.1
  selection_metric: f1
  patience: 10
  min_delta: 0.0
  ece_bins: 10
